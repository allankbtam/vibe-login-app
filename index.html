<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Login/Register Card (shown when logged out) -->
        <div class="auth-card" id="authCard">
            <div class="card-header">
                <h1>Welcome</h1>
                <p class="card-subtitle">Sign in to continue</p>
            </div>

            <!-- Tab Toggle -->
            <div class="tab-toggle">
                <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">Email</label>
                    <input type="email" id="loginUsername" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <p class="form-error" id="loginError"></p>
                <button type="submit" class="auth-btn">Login</button>
            </form>

            <!-- Register Form -->
            <form class="auth-form hidden" id="registerForm">
                <div class="form-group">
                    <label for="registerUsername">Email</label>
                    <input type="email" id="registerUsername" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" placeholder="Choose a password" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="registerConfirmPassword">Confirm Password</label>
                    <input type="password" id="registerConfirmPassword" placeholder="Confirm your password" required autocomplete="new-password">
                </div>
                <p class="form-error" id="registerError"></p>
                <p class="form-success" id="registerSuccess"></p>
                <button type="submit" class="auth-btn">Register</button>
            </form>

            <!-- Version Footer -->
            <div class="auth-card-footer">
                <span id="versionFooter">v0.1.0</span>
            </div>
        </div>

        <!-- Dashboard (shown when logged in) -->
        <div class="dashboard-card hidden" id="dashboardCard">
            <!-- Dashboard Tabs -->
            <div class="dashboard-tabs">
                <button class="dash-tab active" id="dashHomeTab" onclick="switchDashTab('home')">Dashboard</button>
                <button class="dash-tab hidden" id="dashAdminTab" onclick="switchDashTab('admin')">Admin</button>
            </div>

            <!-- Home Tab Content -->
            <div class="dash-content" id="dashHome">
                <div class="dashboard-content">
                    <div class="greeting-icon">👋</div>
                    <h1 class="greeting-title">Hello World, <span class="username-highlight" id="displayUsername"></span>!</h1>
                    <p class="dashboard-subtitle">You are successfully logged in. Welcome to your dashboard.</p>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>

            <!-- Admin Tab Content -->
            <div class="dash-content hidden" id="dashAdmin">
                <div class="admin-panel">
                    <h2>User Management</h2>
                    <div id="adminLoading" class="admin-loading">Loading users...</div>
                    <table class="admin-table hidden" id="usersTable">
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Username</th>
                                <th>Created</th>
                                <th>Admin</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersBody">
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Version Footer -->
            <div class="dashboard-footer">
                <span id="dashboardVersion">v0.1.0</span>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal-overlay hidden" id="confirmModal">
        <div class="modal-content">
            <h3 id="modalTitle">Confirm Action</h3>
            <p id="modalMessage">Are you sure?</p>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="modalCancel">Cancel</button>
                <button class="modal-btn danger" id="modalConfirm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- App Logic (ES Module - imports from config) -->
    <script type="module" src="app.js"></script>
</body>
</html>
